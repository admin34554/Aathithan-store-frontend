<div class="container-fluid p-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5>Master > <span class="text-primary">Supplier Master</span></h5>
    <button class="btn btn-primary">+ Add New</button>
  </div>

  <!-- Search -->
  <div class="row mb-4">
    <div class="col-md-4">
      <input type="text" class="form-control" placeholder="Search Supplier Name">
    </div>
  </div>

  <!-- Tabs -->
  <ul class="nav nav-tabs mb-3">
    <li class="nav-item">
      <button class="nav-link"
        [class.active]="activeTab==='details'"
        (click)="activeTab='details'">
        Supplier Details
      </button>
    </li>

    <li class="nav-item">
      <button class="nav-link"
        [class.active]="activeTab==='address'"
        (click)="activeTab='address'">
        Address
      </button>
    </li>
  </ul>

<form [formGroup]="supplierform" (ngSubmit)="submitForm()">

<!-- SUPPLIER DETAILS TAB -->

<div [hidden]="activeTab !== 'details'">
  
  <div class="mb-3">
    <label class="me-3">Type :</label>

    <input type="radio" value="BLedger" formControlName="type"> Ledger
    <input type="radio" value="OtherSupplier" class="ms-3" formControlName="type"> Other Supplier
  </div>

  <div class="row">

    <div class="col-md-6 mb-3">
      <input class="form-control" placeholder="Contact Person Name" formControlName="contact">
    </div>

    <div class="col-md-6 mb-3">
      <input class="form-control" placeholder="Aadhar No" formControlName="aadharNo">
    </div>

    <div class="col-md-6 mb-3">
      <input class="form-control" placeholder="GSTIN Number" formControlName="gstIn">
    </div>

    <div class="col-md-6 mb-3">
      <input class="form-control" placeholder="PAN Number" formControlName="panNo">
    </div>

    <div class="col-md-6 mb-3">
      <input class="form-control" placeholder="Phone Number" formControlName="phone">
    </div>

    <div class="col-md-6 mb-3">
      <input class="form-control" placeholder="Cell Number" formControlName="mobile">
    </div>

    <div class="col-md-6 mb-3">
      <input class="form-control" placeholder="Credit Period" formControlName="creditPeriod">
    </div>

  </div>

  <div class="form-check mb-3">
    <input type="checkbox" class="form-check-input">
    <label class="form-check-label">Active</label>
  </div>

</div>


<!-- ADDRESS TAB -->

<div [hidden]="activeTab !== 'address'">

  <div class="row">

    <div class="col-md-6 mb-3">
      <input class="form-control" placeholder="Door Number" formControlName="doorNo">
    </div>

    <div class="col-md-6 mb-3">
      <input class="form-control" placeholder="Street" formControlName="street">
    </div>

    <div class="col-md-6 mb-3">
      <input class="form-control" placeholder="Area" formControlName="area">
    </div>

    <div class="col-md-6 mb-3">
      <input class="form-control" placeholder="City" formControlName="city">
    </div>

    <div class="col-md-6 mb-3">
      <input class="form-control" placeholder="State" formControlName="state">
    </div>

    <div class="col-md-6 mb-3">
      <input class="form-control" placeholder="Pincode" formControlName="pinCode">
    </div>



  </div>

</div>

<!-- Buttons -->

<div class="text-end mt-3">
  <button type="button" class="btn btn-secondary me-2" (click)="resetForm()">Cancel</button>
  <button type="submit" class="btn btn-primary">Save</button></div>

</form>

</div>

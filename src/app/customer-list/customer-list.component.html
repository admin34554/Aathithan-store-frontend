<div class="container-fluid p-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5>Master > <span class="text-primary">Customer List</span></h5>

    <div>
        <button class="btn btb-light me-2">
            ✏
        </button>
        <button class="btn btn-light me-2">
             🖨
        </button>
        <button class="btn btn-primary" routerLink="/customer">
            + Add New
        </button>
    </div>
</div>

<div class="row mb-3">
    <div class="col-md-4 d-flex align-items-center">
        <label class="me-2">Search By</label>
        <input type="text" class="form-control" placeholder="Customer Name/Type" 
        [(ngModel)]="searchText" (input)="searchCustomer()"/>    
    </div>
</div>

<div class="table-responsive">
    <table class="table table-bordered">
        <thead class="table-light">
            <tr>
                <th style="width: 100px;">S.No</th>
                <th>Customer Name</th>
                <th>Customer Type</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let customer of filteredCustomers; let i = index">
                <td>{{ (currentPage - 1) * pageSize + i + 1 }}</td>
                <td>{{ customer.fullName }}</td>
                <td>{{ customer.type }}</td>
            </tr>
        <tr *ngIf="paginatedCustomers.length == 0">
            <td colspan="3" class="text-center">No customers found.</td>
        </tr>
        </tbody>
    </table>
</div>

<div class="d-flex justify-content-end align-items-center mt-3">
    <button class="btn btn-light me-2" (click)="prevPage()">Previous</button>
    <span class="me-2">Page {{ currentPage }}</span>
    <button class="btn btn-light ms-2" (click)="nextPage()">Next</button>
</div>
</div>

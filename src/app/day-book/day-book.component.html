<div class="container-fluid p-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5>Master > <span class="text-primary">Day Book</span></h5>

    <div>
      <button class="btn btn-light me-2">✏</button>
      <button class="btn btn-light me-2">🖨</button>
      <button class="btn btn-primary" routerLink="/broker">+ Add New</button>
    </div>
  </div>

  <!-- FILTER SECTION -->
  <div class="row mb-3">
    <div class="col-md-3">
      <label>From Date</label>
      <input type="datetime-local" class="form-control" [(ngModel)]="fromDate">
    </div>

    <div class="col-md-3">
      <label>To Date</label>
      <input type="datetime-local" class="form-control" [(ngModel)]="toDate">
    </div>

    <div class="col-md-2 d-flex align-items-end">
      <button class="btn btn-primary w-100" (click)="loadDayBook()">Search</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-responsive">
    <table class="table table-bordered">
      <thead class="table-light">
        <tr>
          <th>Type</th>
          <th>Name</th>
          <th>Date</th>
          <th>Bill No</th>
          <th>Remarks</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let item of dayBookList">
          <td>{{ item.type }}</td>
          <td>{{ item.name }}</td>
          <td>{{ item.date | date:'short' }}</td>
          <td>{{ item.billNo }}</td>
          <td>{{ item.remarks }}</td>
        </tr>

        <tr *ngIf="dayBookList.length === 0">
          <td colspan="5" class="text-center">No Data Found</td>
        </tr>
      </tbody>
    </table>
  </div>


</div>

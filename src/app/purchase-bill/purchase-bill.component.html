<div class="page-container">
  
  <!-- Header (fixed) -->
  <div style="padding: 20px 20px 0 20px; background: white; border-bottom: 1px solid #dee2e6;">
    <h5>Inventory > <span class="text-primary">Purchase Bill</span></h5>
  </div>

  <!-- Scrollable Content Area -->
  <div class="content-area">
    <div class="form-wrapper">
      <form [formGroup]="purchaseBillForm">

        <div class="container-fluid p-0 mt-3">
          <!-- Top Form -->
          <div class="row">
            <div class="col-md-4">
              <input class="form-control" placeholder="Name" formControlName="name">
            </div>

            <div class="col-md-4">
              <input class="form-control" placeholder="Tax Type" formControlName="taxType">
            </div>

            <div class="col-md-4">
              <input class="form-control" placeholder="Purchase Type" formControlName="purchaseType">
            </div>

            <div class="col-md-4 mt-3">
              <input class="form-control" placeholder="Purchase Bill Number" formControlName="purchaseBillNo">
            </div>

            <div class="col-md-4 mt-3">
              <input class="form-control" placeholder="PO Number" formControlName="poNo">
            </div>

            <div class="col-md-4 mt-3">
              <input class="form-control" placeholder="Broker" formControlName="brokerId">
            </div>

            <div class="col-md-4 mt-3">
                <label>Purchase Bill Date</label>
              <input type="date" class="form-control" placeholder="Purchase Bill Date" formControlName="purchaseBillDate">
            </div>

            <div class="col-md-4 mt-3">
                <label>Customer Bill Date</label>
              <input type="date" class="form-control" placeholder="Customer Bill Date" formControlName="custBillDate">
            </div>
          </div>

          <!-- TABLE -->
          <div class="table-responsive mt-4">
            <table class="table table-bordered">
              <thead class="table-light">
                <tr>
                  <th style="width: 60px;">S.No</th>
                  <th>Product Code</th>
                  <th>Item Name</th>
                  <th>PO.L.P Rate</th>
                  <th>Balance Quantity</th>
                  <th>Quantity</th>
                  <th>Rate</th>
                  <th>Br.Comm</th>
                  <th>Br.Total</th>
                  <th style="width: 80px;">Action</th>
                </tr>
              </thead>

              <tbody formArrayName="items">
                <tr *ngFor="let row of items.controls; let i = index" [formGroupName]="i">
                  <td>{{ i + 1 }}</td>
                  <td>
                    <input class="form-control" formControlName="productCode">
                  </td>
                  <td>
                    <input class="form-control" formControlName="itemName">
                  </td>
                  <td>
                    <input type="number" class="form-control" formControlName="pRate">
                  </td>
                  <td>
                    <input type="number" class="form-control" formControlName="balanceQuantity">
                  </td>
                  <td>
                    <input type="number" class="form-control" formControlName="quantity">
                  </td>
                  <td>
                    <input type="number" class="form-control" formControlName="rate">
                  </td>
                  <td>
                    <input type="number" class="form-control" formControlName="brComm">
                  </td>
                  <td>
                    <input class="form-control" formControlName="brTotal">
                  </td>
                  <td class="text-center">
                    <button 
                      type="button" 
                      class="btn btn-danger btn-sm"
                      (click)="removeRow(i)">
                      ✕
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>

            <!-- Add Row Button -->
            <button 
              type="button" 
              class="btn btn-primary btn-sm mt-2 mb-2"
              (click)="addRow()">
              + Add Row
            </button>
          </div>

          <!-- Bottom Section -->
          <div class="row mt-4">
            <!-- Remarks -->
            <div class="col-md-8">
              <textarea 
                class="form-control" 
                rows="4" 
                placeholder="Remarks"
                formControlName="remarks">
              </textarea>
            </div>
          </div>

          <!-- Buttons - Moved INSIDE the form and container -->
          <div class="button-section mt-4">
            <button 
              type="button" 
              class="btn btn-secondary me-2"
              (click)="cancelForm()">
              Cancel
            </button>
            <button 
              type="button" 
              class="btn btn-primary"
              (click)="savePurchaseBill()">
              Save
            </button>
          </div>

        </div> <!-- Close container-fluid -->

      </form>
    </div>
  </div> <!-- Close content-area -->

</div> <!-- Close page-container -->
